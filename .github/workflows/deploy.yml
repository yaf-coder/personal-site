name: Deploy to GitHub Pages

on:
  # Deploy on every push to main.
  push:
    branches: [main]
  # ...and allow manual runs from the Actions tab.
  workflow_dispatch:

# Least-privilege token needed to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; don't cancel an in-flight publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build

      # Belt-and-suspenders: keeps GitHub from Jekyll-processing the _next/ dir.
      - name: Disable Jekyll
        run: touch ./out/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
